name: CI Build

on:
  push:
    branches: [main]

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CHROMATIC_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
      CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.ref }}
      CHROMATIC_SLUG: ${{ github.repository }}
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          cache: yarn
          node-version-file: .nvmrc

      - name: Yarn Install
        run: yarn

      - name: Lint
        run: yarn lint

      - name: Jest Tests
        run: yarn test --coverage

      - name: Sonar analysis
        if: ${{ env.SONAR_TOKEN }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e

      - name: Package build
        run: yarn build
        env:
          NODE_ENV: production

      - name: Storybook build
        run: yarn build-storybook
        env:
          NODE_ENV: production

      - name: Switch to PR branch
        if: ${{ github.event_name == 'pull_request' && env.CHROMATIC_PROJECT_TOKEN }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          clean: false
          fetch-depth: 0
          ref: ${{ env.CHROMATIC_BRANCH }}

      - name: Storybook deploy
        if: ${{ env.CHROMATIC_PROJECT_TOKEN }}
        uses: chromaui/action@c49581ed7e45543eef2b5d727cf97a688a83e7d8
        with:
          autoAcceptChanges: main
          branchName: ${{ env.CHROMATIC_BRANCH}}
          exitZeroOnChanges: false
          onlyChanged: ${{ github.event_name == 'pull_request' }}
          projectToken: ${{ env.CHROMATIC_PROJECT_TOKEN }}
          token: ${{ env.GITHUB_TOKEN }}
