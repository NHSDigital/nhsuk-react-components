nodeLinker: node-modules

npmRegistryServer: "https://registry.yarnpkg.com"

packageExtensions:
  "@rolldown/binding-wasm32-wasi@*":
    dependencies:
      "@emnapi/core": "*"
      "@emnapi/runtime": "*"
  "@storybook/addon-docs@*":
    peerDependencies:
      "@types/react": "*"
      "@types/react-dom": "*"
  "@storybook/react-vite@*":
    peerDependencies:
      typescript: "*"
  storybook@*:
    peerDependencies:
      "@testing-library/dom": "*"
      react: "*"
      react-dom: "*"
  vite@*:
    peerDependencies:
      rollup: "*"
